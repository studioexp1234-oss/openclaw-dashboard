<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="Mobile-first OpenClaw dashboard for monitoring agents and N8N workflows." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2316213e'/%3E%3Cpath d='M18 44V20h10c10.5 0 18 4.6 18 12s-7.5 12-18 12H18zm8-7h3.5c5.9 0 9.8-1.7 9.8-5s-3.9-5-9.8-5H26v10z' fill='%23e94560'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/style.css" />
    <title>OpenClaw Dashboard</title>
  </head>
  <body>
    <div class="app-shell">
      <main class="container">
        <section id="login-view" class="view active">
          <div class="panel auth-panel glass">
            <div class="eyebrow">OpenClaw Dashboard</div>
            <h1>PIN Login</h1>
            <p class="muted">Secure mobile access for Charlie to monitor agents and workflows.</p>
            <form id="login-form" class="stack" autocomplete="off">
              <label class="field">
                <span>PIN code</span>
                <input id="pin-input" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="Enter PIN" required />
              </label>
              <button class="btn btn-primary" type="submit">Unlock dashboard</button>
            </form>
            <p id="login-error" class="feedback error hidden" role="alert"></p>
          </div>
        </section>

        <section id="dashboard-view" class="view hidden">
          <header class="hero glass">
            <div>
              <div class="eyebrow">OpenClaw PWA</div>
              <h1>Agent control center</h1>
              <p class="muted">Live configuration view for agents and local N8N workflows.</p>
            </div>
            <div class="hero-actions">
              <button id="refresh-button" class="btn btn-secondary" type="button">Refresh</button>
              <button id="logout-button" class="btn btn-ghost" type="button">Log out</button>
            </div>
          </header>

          <section class="section-block">
            <div class="section-heading">
              <h2>Agents</h2>
              <span id="agent-count" class="badge">0</span>
            </div>
            <div id="agents-grid" class="card-grid"></div>
          </section>

          <section class="section-block">
            <div class="section-heading">
              <h2>N8N Workflows</h2>
              <span id="workflow-count" class="badge">0</span>
            </div>
            <div id="workflow-list" class="workflow-list"></div>
          </section>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden" aria-live="polite"></div>
    <script src="/app.js" defer></script>
  </body>
</html>
